name: CI/CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  mediawiki-smoke:
    name: MediaWiki 1.46 smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate scripts and Compose model
        run: |
          bash -n docker/mediawiki/entrypoint.sh scripts/deployment/*.sh
          sh -n scripts/backups/create-backup.sh scripts/backups/restore-container.sh
          docker compose --env-file /dev/null config --quiet

      - name: Build MediaWiki image
        run: docker compose --env-file /dev/null build mediawiki

      - name: Fresh install and explicit migrations
        run: |
          docker compose --env-file /dev/null -p mediawiki_smoke up -d --wait postgres
          docker compose --env-file /dev/null -p mediawiki_smoke up -d --no-deps mediawiki
          for attempt in $(seq 1 30); do
            status=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{end}}' $(docker compose --env-file /dev/null -p mediawiki_smoke ps -q mediawiki))
            test "$status" = healthy && break
            sleep 2
          done
          test "$status" = healthy
          docker compose --env-file /dev/null -p mediawiki_smoke \
            --profile migration run --rm --no-deps -T mediawiki-migrate
          docker compose --env-file /dev/null -p mediawiki_smoke \
            --profile migration run --rm --no-deps -T mediawiki-migrate
          docker compose --env-file /dev/null -p mediawiki_smoke exec -T mediawiki \
            php /usr/local/bin/mediawiki-healthcheck.php

      - name: Tear down smoke stack
        if: always()
        run: docker compose --env-file /dev/null -p mediawiki_smoke down --volumes

  build:
    name: Build images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build app
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/app:${{ steps.meta.outputs.sha_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/app:main
          cache-from: type=gha,scope=app
          cache-to: type=gha,scope=app,mode=max

      - name: Build mediawiki
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/mediawiki/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/mediawiki:${{ steps.meta.outputs.sha_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/mediawiki:main
          cache-from: type=gha,scope=mediawiki
          cache-to: type=gha,scope=mediawiki,mode=max

      - name: Build phpbb
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/phpbb/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/phpbb:${{ steps.meta.outputs.sha_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/phpbb:main
          cache-from: type=gha,scope=phpbb
          cache-to: type=gha,scope=phpbb,mode=max

  deploy:
    name: Deploy to production
    if: github.ref == 'refs/heads/main'
    needs: [build, mediawiki-smoke]
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync config files
        env:
          RELEASE_DIR: /opt/app/.incoming/${{ needs.build.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_SSH_PORT || '22' }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "mkdir -p '$RELEASE_DIR'"
          scp -i ~/.ssh/deploy_key -r -P ${{ secrets.DEPLOY_SSH_PORT || '22' }} \
            docker-compose.yml Caddyfile docker/ scripts/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:"$RELEASE_DIR/"

      - name: Run deploy
        env:
          RELEASE_DIR: /opt/app/.incoming/${{ needs.build.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_SSH_PORT || '22' }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "IMAGE_TAG=${{ needs.build.outputs.image_tag }} APP_DIR=/opt/app RELEASE_DIR='$RELEASE_DIR' bash '$RELEASE_DIR/scripts/deployment/deploy.sh'"
