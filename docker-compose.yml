services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTPS_PORT:-8443}:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - app
      - mediawiki
      - phpbb

  app:
    build: .
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-vgindex}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-vgindex}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-devsecretkey0000000000000000000000000000000000000000000000000000}
      - DOMAIN=${DOMAIN:-localhost}
      - HTTPS_PORT=${HTTPS_PORT:-8443}
      - APP_PORT=${APP_PORT:-3000}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-http://app:3000}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
    volumes:
      - archive_cache:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-vgindex}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-vgindex}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vgindex}"]
      interval: 5s
      timeout: 5s
      retries: 5

  phpbb:
    build:
      context: .
      dockerfile: docker/phpbb/Dockerfile
    restart: unless-stopped
    environment:
      - PHPBB_DB_HOST=postgres
      - PHPBB_DB_PORT=5432
      - PHPBB_DB_NAME=phpbb
      - PHPBB_DB_USER=${POSTGRES_USER:-vgindex}
      - PHPBB_DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - PHPBB_TABLE_PREFIX=${PHPBB_TABLE_PREFIX:-phpbb_}
      - PHPBB_ADMIN_USER=${PHPBB_ADMIN_USER:-admin}
      - PHPBB_ADMIN_PASSWORD=${PHPBB_ADMIN_PASSWORD:-changeme}
      - PHPBB_ADMIN_EMAIL=${PHPBB_ADMIN_EMAIL:-admin@example.com}
      - PHPBB_BOARD_NAME=${DOMAIN:-localhost} Forum
      - PHPBB_BOARD_DESCRIPTION=Disc Preservation Community
      - DOMAIN=${DOMAIN:-localhost}
      - HTTPS_PORT=${HTTPS_PORT:-8443}
      - PHPBB_SERVER_NAME=forum.${DOMAIN:-localhost}
      - PHPBB_OIDC_CLIENT_ID=${PHPBB_OIDC_CLIENT_ID:-phpbb-client}
      - PHPBB_OIDC_CLIENT_SECRET=${PHPBB_OIDC_CLIENT_SECRET:-change-this-secret-phpbb}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-http://app:3000}
      - APP_DB_NAME=${POSTGRES_DB:-vgindex}
    volumes:
      - phpbb_files:/var/www/html/files
      - phpbb_store:/var/www/html/store
      - phpbb_avatars:/var/www/html/images/avatars/upload
    depends_on:
      postgres:
        condition: service_healthy

  mediawiki:
    build:
      context: .
      dockerfile: docker/mediawiki/Dockerfile
    restart: unless-stopped
    environment:
      - MEDIAWIKI_DB_HOST=postgres
      - MEDIAWIKI_DB_PORT=5432
      - MEDIAWIKI_DB_SCHEMA=public
      - MEDIAWIKI_DB_NAME=mediawiki
      - MEDIAWIKI_DB_USER=${POSTGRES_USER:-vgindex}
      - MEDIAWIKI_DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - MEDIAWIKI_DB_TYPE=postgres
      - SITE_DOMAIN=${DOMAIN:-localhost}
      - HTTPS_PORT=${HTTPS_PORT:-8443}
      - MEDIAWIKI_ADMIN_USER=${MEDIAWIKI_ADMIN_USER:-admin}
      - MEDIAWIKI_ADMIN_PASSWORD=${MEDIAWIKI_ADMIN_PASSWORD:-ChangeMe!Admin2026}
      - OIDC_PROVIDER_URL=${OIDC_PROVIDER_URL:-http://app:3000}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-mediawiki-client}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-change-this-secret-mediawiki}
    volumes:
      - mediawiki_uploads:/var/www/html/images
      - ./docker/mediawiki/LocalSettings.php:/etc/mediawiki/LocalSettings.php:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  archive_cache:
  phpbb_files:
  phpbb_store:
  phpbb_avatars:
  mediawiki_uploads:
