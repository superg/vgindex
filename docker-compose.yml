services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTPS_PORT:-8443}:443"
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - APP_HOST=${APP_HOST:-app}
      - APP_PORT=${APP_PORT:-3000}
      - HTTPS_PORT=${HTTPS_PORT:-8443}
      - ACME_EMAIL=${ACME_EMAIL:-admin@example.com}

    depends_on:
      - app
      - mediawiki
      - phpbb

  app:
    build: .
    image: ${APP_IMAGE:-app}:${IMAGE_TAG:-dev}
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-myapp}
      - POSTGRES_HOST=postgres
      - DOMAIN=${DOMAIN:-localhost}
      - HTTPS_PORT=${HTTPS_PORT:-8443}
      - APP_PORT=${APP_PORT:-3000}
      - OIDC_ISSUER_URL=http://${APP_HOST:-app}:${APP_PORT:-3000}
    volumes:
      - archive_cache:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-myapp}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-myapp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  phpbb:
    build:
      context: .
      dockerfile: docker/phpbb/Dockerfile
    image: ${PHPBB_IMAGE:-phpbb}:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "${PHPBB_HTTP_PORT:-18080}:80"
    environment:
      - PHPBB_DB_HOST=postgres
      - PHPBB_DB_PORT=5432
      - PHPBB_DB_NAME=phpbb
      - PHPBB_DB_USER=${POSTGRES_USER:-admin}
      - PHPBB_DB_PASSWORD=${POSTGRES_PASSWORD:-changeme-postgres}
      - PHPBB_TABLE_PREFIX=${PHPBB_TABLE_PREFIX:-phpbb_}
      - PHPBB_ADMIN_USER=${PHPBB_ADMIN_USER:-admin}
      - PHPBB_ADMIN_PASSWORD=${PHPBB_ADMIN_PASSWORD:-changeme-phpbb}
      - PHPBB_ADMIN_EMAIL=${PHPBB_ADMIN_EMAIL:-admin@example.com}
      - PHPBB_BOARD_NAME=${DOMAIN:-localhost} Forum
      - PHPBB_BOARD_DESCRIPTION=Disc Preservation Community
      - DOMAIN=${DOMAIN:-localhost}
      - HTTPS_PORT=${HTTPS_PORT:-8443}
      - PHPBB_SERVER_NAME=${PHPBB_SERVER_NAME:-localhost}
      - PHPBB_SERVER_PORT=${PHPBB_SERVER_PORT:-18080}
      - PHPBB_SERVER_PROTOCOL=${PHPBB_SERVER_PROTOCOL:-http://}
      - PHPBB_COOKIE_DOMAIN=${PHPBB_COOKIE_DOMAIN:-}
      - PHPBB_EMAIL_ENABLE=${PHPBB_EMAIL_ENABLE:-false}
      - PHPBB_BOARD_EMAIL=${PHPBB_BOARD_EMAIL:-admin@example.com}
      - PHPBB_CONTACT_EMAIL=${PHPBB_CONTACT_EMAIL:-admin@example.com}
      - PHPBB_SMTP_HOST=${PHPBB_SMTP_HOST:-}
      - PHPBB_SMTP_PORT=${PHPBB_SMTP_PORT:-25}
      - PHPBB_SMTP_USER=${PHPBB_SMTP_USER:-}
      - PHPBB_SMTP_PASSWORD=${PHPBB_SMTP_PASSWORD:-}
      - PHPBB_SMTP_AUTH_METHOD=${PHPBB_SMTP_AUTH_METHOD:-}
      - PHPBB_SMTP_SECURE=${PHPBB_SMTP_SECURE:-}
      - PHPBB_OIDC_ISSUER_URL=${PHPBB_OIDC_ISSUER_URL:-http://phpbb/app.php/oidc}
      - PHPBB_OIDC_AUTHORIZE_URL=${PHPBB_OIDC_AUTHORIZE_URL:-}
      - MEDIAWIKI_OIDC_CLIENT_ID=${MEDIAWIKI_OIDC_CLIENT_ID:-mediawiki-client}
      - MEDIAWIKI_OIDC_CLIENT_SECRET=${MEDIAWIKI_OIDC_CLIENT_SECRET:-changeme-mediawiki-oidc}
    volumes:
      - phpbb_files:/var/www/html/files
      - phpbb_store:/var/www/html/store
      - phpbb_avatars:/var/www/html/images/avatars/upload
      - ./data/redump:/import/redump:ro
    depends_on:
      postgres:
        condition: service_healthy

  mediawiki:
    build:
      context: .
      dockerfile: docker/mediawiki/Dockerfile
    image: ${MEDIAWIKI_IMAGE:-mediawiki}:${IMAGE_TAG:-dev}
    restart: unless-stopped
    environment:
      - MEDIAWIKI_DB_HOST=postgres
      - MEDIAWIKI_DB_PORT=5432
      - MEDIAWIKI_DB_SCHEMA=public
      - MEDIAWIKI_DB_NAME=mediawiki
      - MEDIAWIKI_DB_USER=${POSTGRES_USER:-admin}
      - MEDIAWIKI_DB_PASSWORD=${POSTGRES_PASSWORD:-changeme-postgres}
      - MEDIAWIKI_DB_TYPE=postgres
      - MEDIAWIKI_SECRET_KEY=${MEDIAWIKI_SECRET_KEY:-00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff}
      - MEDIAWIKI_UPGRADE_KEY=${MEDIAWIKI_UPGRADE_KEY:-0011223344556677}
      - SITE_DOMAIN=${DOMAIN:-localhost}
      - HTTPS_PORT=${HTTPS_PORT:-8443}
      - MEDIAWIKI_ADMIN_USER=${MEDIAWIKI_ADMIN_USER:-admin}
      - MEDIAWIKI_ADMIN_PASSWORD=${MEDIAWIKI_ADMIN_PASSWORD:-changeme-mediawiki}
      - OIDC_PROVIDER_URL=${OIDC_PROVIDER_URL:-http://phpbb/app.php/oidc}
      - MEDIAWIKI_OIDC_CLIENT_ID=${MEDIAWIKI_OIDC_CLIENT_ID:-mediawiki-client}
      - MEDIAWIKI_OIDC_CLIENT_SECRET=${MEDIAWIKI_OIDC_CLIENT_SECRET:-changeme-mediawiki-oidc}
      - MEDIAWIKI_OIDC_VERIFY_TLS=${MEDIAWIKI_OIDC_VERIFY_TLS:-true}
      - MEDIAWIKI_LOCAL_LOGIN=${MEDIAWIKI_LOCAL_LOGIN:-false}
    volumes:
      - mediawiki_uploads:/var/www/html/images
      - ./docker/mediawiki/LocalSettings.php:/etc/mediawiki/LocalSettings.php:ro
      - ./data/redump:/import/redump:ro
    depends_on:
      postgres:
        condition: service_healthy
      phpbb:
        condition: service_started

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  archive_cache:
  phpbb_files:
  phpbb_store:
  phpbb_avatars:
  mediawiki_uploads:
